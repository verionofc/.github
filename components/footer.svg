<svg width="1600" height="260" viewBox="0 0 1600 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1600" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5"/>
      <stop offset="0.5" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>

    <linearGradient id="glow" x1="800" y1="0" x2="800" y2="260">
      <stop stop-color="#7C3AED" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>

    <filter id="blur">
      <feGaussianBlur stdDeviation="35"/>
    </filter>
  </defs>

  <!-- Background Glow -->
  <ellipse 
    cx="800" 
    cy="170" 
    rx="340" 
    ry="80" 
    fill="url(#glow)" 
    filter="url(#blur)"
  />

  <!-- Decorative Grid -->
  <g opacity="0.08" stroke="#FFFFFF">
    <path d="M0 240H1600"/>
    <path d="M0 210H1600"/>
    <path d="M0 180H1600"/>
    <path d="M0 150H1600"/>

    <path d="M250 120V260"/>
    <path d="M500 120V260"/>
    <path d="M750 120V260"/>
    <path d="M1000 120V260"/>
    <path d="M1250 120V260"/>
    <path d="M1500 120V260"/>
  </g>

  <!-- Main Wave -->
  <path
    d="
    M0 180
    C150 140 280 210 430 180
    C560 155 650 110 800 135
    C960 162 1080 230 1220 195
    C1370 160 1480 135 1600 170"
    stroke="url(#line)"
    stroke-width="3"
    fill="none"
    stroke-linecap="round"
  />

  <!-- Accent Dots -->
  <g fill="#7C3AED">
    <circle cx="250" cy="174" r="3"/>
    <circle cx="520" cy="151" r="3"/>
    <circle cx="800" cy="135" r="4"/>
    <circle cx="1100" cy="181" r="3"/>
    <circle cx="1420" cy="150" r="3"/>
  </g>

  <!-- Center Logo -->
  <g transform="translate(776 71)">
    <circle 
      cx="24" 
      cy="24" 
      r="24" 
      fill="#0F172A" 
      stroke="url(#line)" 
      stroke-width="2"
    />

    <image
      href="../assets/verion/svg/favicon.svg"
      x="8"
      y="8"
      width="32"
      height="32"
      preserveAspectRatio="xMidYMid meet"
    />
  </g>

  <!-- Brand -->
  <text
    x="800"
    y="205"
    text-anchor="middle"
    fill="#E5E7EB"
    font-family="Inter, Segoe UI, sans-serif"
    font-size="22"
    font-weight="700">
    Verion Studio, Inc.
  </text>

  <text
    x="800"
    y="228"
    text-anchor="middle"
    fill="#9CA3AF"
    font-family="Inter, Segoe UI, sans-serif"
    font-size="13">
    Construindo softwares modernos e experiências de código aberto.
  </text>
</svg>