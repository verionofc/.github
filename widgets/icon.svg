<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .dark {
        display: block;
      }

      .light {
        display: none;
      }

      @media (prefers-color-scheme: light) {
        .dark {
          display: none;
        }

        .light {
          display: block;
        }
      }
    </style>
  </defs>

  <image
    class="dark"
    href="https://raw.githubusercontent.com/verionofc/.github/main/assets/verion/svg/symbol.svg"
    width="48"
    height="48"
  />

  <image
    class="light"
    href="https://raw.githubusercontent.com/verionofc/.github/main/assets/verion/svg/symbol-black.svg"
    width="48"
    height="48"
  />
</svg>